# ============================================================
# Blúmen Vision — Cloud Build CI/CD
# Build, push para Artifact Registry e deploy no Cloud Run
# ============================================================

steps:
  # Step 1: Build da imagem Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/blumen-vision/blumen-vision-app:$COMMIT_SHA'
      - '-t'
      - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/blumen-vision/blumen-vision-app:latest'
      - '.'

  # Step 2: Push da imagem para o Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/blumen-vision/blumen-vision-app'

  # Step 3: Deploy no Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'blumen-vision-app'
      - '--image'
      - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/blumen-vision/blumen-vision-app:$COMMIT_SHA'
      - '--region'
      - 'southamerica-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--port'
      - '8080'
      - '--set-env-vars'
      - 'NODE_ENV=production'

# Imagens a serem armazenadas no Artifact Registry
images:
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/blumen-vision/blumen-vision-app:$COMMIT_SHA'
  - 'southamerica-east1-docker.pkg.dev/$PROJECT_ID/blumen-vision/blumen-vision-app:latest'

# Timeout de 20 minutos para o build completo
timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY

# ═══════════════════════════════════════════════════════════════
# Blumen Vision — Cloud Build CI/CD
# Build e deploy automático no Cloud Run
# ═══════════════════════════════════════════════════════════════

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/blumen-vision:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/blumen-vision:latest'
      - '--build-arg'
      - 'DATABASE_URL=${_DATABASE_URL}'
      - '--build-arg'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY}'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/blumen-vision:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/blumen-vision:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'blumen-vision'
      - '--image'
      - 'gcr.io/$PROJECT_ID/blumen-vision:$COMMIT_SHA'
      - '--region'
      - 'southamerica-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'DATABASE_URL=${_DATABASE_URL},GEMINI_API_KEY=${_GEMINI_API_KEY},NODE_ENV=production'

substitutions:
  _DATABASE_URL: ''
  _GEMINI_API_KEY: ''

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'gcr.io/$PROJECT_ID/blumen-vision:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/blumen-vision:latest'
